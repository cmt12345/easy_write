name: Build Installable APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: easy-write-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Publish APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create debug-apk-20260624 \
            app/build/outputs/apk/debug/app-debug.apk \
            --target "${{ github.sha }}" \
            --title "Easy Write Debug APK" \
            --notes "Installable debug APK built automatically by GitHub Actions."

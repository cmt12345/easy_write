name: Publish APK Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-apk.yml"

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Download demo APK artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/actions/artifacts/7841693363/zip > easy-write-demo-apk.zip

      - name: Extract and verify demo APK
        run: mkdir -p artifact && unzip -q easy-write-demo-apk.zip -d artifact && test -f artifact/app-debug.apk

      - name: Replace public release APK
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload debug-apk-20260624 artifact/app-debug.apk --clobber
